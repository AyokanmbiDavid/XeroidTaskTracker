<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Xeroid TaskTracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Google Sans', 'sans-serif'] },
                    colors: {
                        m3Bg: '#F7F9FF',
                        m3Surf: '#EEF2FA',
                        m3Prim: '#006492',
                        m3SecContainer: '#D1E4FF',
                        m3Error: '#BA1A1A'
                    }
                }
            }
        }
    </script>

    <style>
        * { -webkit-tap-highlight-color: transparent; outline: none; }
        body { background-color: #F7F9FF; color: #191C1E; overflow-x: hidden; }
        .m3-card { border-radius: 28px; }
        .m3-pill { border-radius: 100px; }
        
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #EEF2FA; border-top: 1px solid #D1D9E0;
            display: flex; justify-content: space-around; padding: 12px 0 env(safe-area-inset-bottom, 24px) 0; z-index: 100;
        }

        .view { display: none; }
        .view.active { display: block; animation: m3-fade 0.3s ease-out; }
        @keyframes m3-fade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .m3-input { background: #E1E2E9; border-bottom: 2px solid #43474E; border-radius: 4px 4px 0 0; width: 100%; padding: 1rem; }
        .nav-item.active .icon-bg { background: #D1E4FF; width: 64px; border-radius: 16px; color: #001D35; }
        
        /* M3 Toggle */
        .switch { position: relative; display: inline-block; width: 52px; height: 32px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #C1C7CE; transition: .4s; border-radius: 32px; }
        .slider:before { position: absolute; content: ""; height: 24px; width: 24px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #006492; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body class="font-sans pb-32" onclick="unlockAudioEngine()">

    <header class="sticky top-0 z-50 bg-m3Bg/95 backdrop-blur-md px-6 py-5 border-b border-slate-100">
        <div class="max-w-3xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-m3Prim flex items-center gap-2">
                <span class="material-symbols-rounded">timer</span> TaskTracker
            </h1>
            
            <div class="flex items-center gap-3 bg-white px-3 py-2 rounded-2xl shadow-sm border border-slate-100">
                <span class="text-[9px] font-black text-slate-500 uppercase">Alerts</span>
                <label class="switch">
                    <input type="checkbox" id="master-toggle" onchange="handleToggle()">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-4 mt-4">
        
        <div id="status-bar" class="mb-6 p-4 m3-card flex items-center gap-3 transition-all duration-500 bg-amber-100 text-amber-900">
            <span id="status-icon" class="material-symbols-rounded animate-pulse">lock</span>
            <p id="status-text" class="text-xs font-bold uppercase tracking-tight">Tap screen to activate beep engine</p>
        </div>

        <div id="view-list" class="view active space-y-6">
            <section id="critical-section" class="hidden">
                <h2 class="text-[10px] font-black text-m3Error px-2 mb-3 uppercase tracking-widest">Immediate</h2>
                <div id="overdue-list" class="space-y-3"></div>
            </section>

            <section>
                <h2 class="text-[10px] font-black text-slate-400 px-2 mb-3 uppercase tracking-widest">Active Timeline</h2>
                <div id="active-list" class="space-y-3"></div>
                <div id="empty-state" class="text-center py-20 opacity-20">
                    <span class="material-symbols-rounded text-6xl">timer_off</span>
                    <p class="mt-2 font-medium">No countdowns active</p>
                </div>
            </section>
        </div>

        <div id="view-add" class="view space-y-6">
            <div class="bg-m3Surf p-6 m3-card space-y-5 shadow-sm">
                <div>
                    <label class="text-[11px] font-bold text-m3Prim block mb-1 uppercase ml-1">Objective</label>
                    <input id="task-title" type="text" placeholder="Mission Name" class="m3-input">
                </div>
                <div>
                    <label class="text-[11px] font-bold text-m3Prim block mb-1 uppercase ml-1">Details</label>
                    <textarea id="task-desc" placeholder="Optional notes" class="m3-input h-24 resize-none"></textarea>
                </div>
                <div>
                    <label class="text-[11px] font-bold text-m3Prim block mb-1 uppercase ml-1">Execution Time</label>
                    <p class="text-[10px] text-slate-500 mb-2 ml-1">The alarm will sound when the countdown hits zero.</p>
                    <input id="task-time" type="datetime-local" class="m3-input font-medium">
                </div>
                <button onclick="addTask()" class="w-full bg-m3Prim text-white py-4 m3-pill font-bold shadow-lg shadow-blue-200">Start Countdown</button>
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item active flex flex-col items-center gap-1 cursor-pointer" onclick="switchView('list', this)">
            <div class="icon-bg py-1 px-6 flex justify-center"><span class="material-symbols-rounded">browse_gallery</span></div>
            <span class="text-[10px] font-bold tracking-tighter">MISSIONS</span>
        </div>
        <div class="nav-item flex flex-col items-center gap-1 cursor-pointer" onclick="switchView('add', this)">
            <div class="icon-bg py-1 px-6 flex justify-center"><span class="material-symbols-rounded">more_time</span></div>
            <span class="text-[10px] font-bold tracking-tighter">NEW TASK</span>
        </div>
    </nav>

    <script>
        let tasks = JSON.parse(localStorage.getItem('xeroid_v8')) || [];
        let audioEnabled = JSON.parse(localStorage.getItem('xeroid_audio_v8')) ?? true;
        let audioUnlocked = false;
        
        const alertSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

        // Init UI
        document.getElementById('master-toggle').checked = audioEnabled;

        function unlockAudioEngine() {
            if (audioUnlocked || !audioEnabled) return;
            alertSound.muted = true;
            alertSound.play().then(() => {
                alertSound.pause();
                alertSound.currentTime = 0;
                alertSound.muted = false;
                audioUnlocked = true;
                updateStatusUI();
            });
        }

        function handleToggle() {
            audioEnabled = document.getElementById('master-toggle').checked;
            localStorage.setItem('xeroid_audio_v8', JSON.stringify(audioEnabled));
            if (!audioEnabled) audioUnlocked = false;
            updateStatusUI();
        }

        function updateStatusUI() {
            const bar = document.getElementById('status-bar');
            const icon = document.getElementById('status-icon');
            const text = document.getElementById('status-text');

            if (!audioEnabled) {
                bar.className = "mb-6 p-4 m3-card flex items-center gap-3 bg-slate-200 text-slate-500 shadow-none";
                icon.innerText = "volume_off"; text.innerText = "Alerts Disabled";
            } else if (!audioUnlocked) {
                bar.className = "mb-6 p-4 m3-card flex items-center gap-3 bg-amber-100 text-amber-900 shadow-sm";
                icon.innerText = "lock"; text.innerText = "Tap screen to arm alarm";
            } else {
                bar.className = "mb-6 p-4 m3-card flex items-center gap-3 bg-emerald-100 text-emerald-900 shadow-sm";
                icon.innerText = "notifications_active"; text.innerText = "Beep Engine Active";
            }
        }

        function switchView(viewId, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + viewId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        function addTask() {
            const title = document.getElementById('task-title').value.trim();
            const desc = document.getElementById('task-desc').value.trim();
            const time = document.getElementById('task-time').value;
            if (!title || !time) return;

            tasks.push({ id: Date.now(), title, desc, deadline: new Date(time).getTime(), alerted: false });
            save();
            document.getElementById('task-title').value = '';
            document.getElementById('task-desc').value = '';
            document.getElementById('task-time').value = '';
            switchView('list', document.querySelectorAll('.nav-item')[0]);
        }

        function save() {
            localStorage.setItem('xeroid_v8', JSON.stringify(tasks));
            render();
        }

        function render() {
            const activeList = document.getElementById('active-list');
            const overdueList = document.getElementById('overdue-list');
            const now = Date.now();
            
            activeList.innerHTML = '';
            overdueList.innerHTML = '';
            let overdueCount = 0;

            tasks.sort((a,b) => a.deadline - b.deadline).forEach(task => {
                const diff = task.deadline - now;
                const isOverdue = diff <= 0;

                if (isOverdue && !task.alerted && audioUnlocked && audioEnabled) {
                    alertSound.play();
                    task.alerted = true;
                    localStorage.setItem('xeroid_v8', JSON.stringify(tasks));
                }

                if (isOverdue) overdueCount++;

                // LIVE COUNTDOWN LOGIC
                let countdown = "";
                if (!isOverdue) {
                    const h = Math.floor(diff / 3600000);
                    const m = Math.floor((diff % 3600000) / 60000);
                    const s = Math.floor((diff % 60000) / 1000);
                    countdown = `${h}h ${m}m ${s}s`;
                } else {
                    countdown = "EXPIRED";
                }

                const card = `
                    <div class="m3-card p-6 ${isOverdue ? 'bg-m3Error/10 text-m3Error border-none' : 'bg-white shadow-sm border border-slate-100'}">
                        <div class="flex justify-between items-start gap-4">
                            <div class="flex-1 overflow-hidden">
                                <span class="text-[9px] font-black tracking-widest opacity-60 uppercase">${countdown}</span>
                                <h3 class="text-lg font-bold mt-1 truncate">${task.title}</h3>
                                ${task.desc ? `<p class="mt-2 text-sm opacity-70 italic border-t ${isOverdue ? 'border-m3Error/20' : 'border-slate-50'} pt-2">${task.desc}</p>` : ''}
                            </div>
                            <button onclick="removeTask(${task.id})" class="w-12 h-12 flex-shrink-0 m3-pill ${isOverdue ? 'bg-m3Error text-white' : 'bg-m3SecContainer text-m3Prim'} flex items-center justify-center shadow-sm">
                                <span class="material-symbols-rounded">${isOverdue ? 'close' : 'check'}</span>
                            </button>
                        </div>
                    </div>`;

                if (isOverdue) overdueList.innerHTML += card;
                else activeList.innerHTML += card;
            });

            document.getElementById('critical-section').classList.toggle('hidden', overdueCount === 0);
            document.getElementById('empty-state').classList.toggle('hidden', tasks.length > 0);
            updateStatusUI();
        }

        function removeTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            save();
        }

        setInterval(render, 1000);
        render();
    </script>
</body>
</html>
