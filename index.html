<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XeroidTaskReminder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%); 
            min-height: 100vh;
            color: #334155;
        }

        /* INTENSIFIED GLASS EFFECT */
        .glass {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(20px) saturate(160%);
            -webkit-backdrop-filter: blur(20px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 32px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
        }

        .task-card-glass {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
            transition: all 0.3s ease;
        }

        /* FLASHY GLASS BUTTON */
        .flashy-activate {
            animation: flashy-glow 2s infinite;
            background: rgba(245, 158, 11, 0.9);
            backdrop-filter: blur(5px);
        }

        @keyframes flashy-glow {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.6); }
            50% { transform: scale(1.03); box-shadow: 0 0 25px 12px rgba(245, 158, 11, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
        }

        /* PULSATING OVERDUE GLASS */
        .pulse-overdue {
            animation: pulse-red-glass 2s infinite;
            border: 1px solid rgba(239, 68, 68, 0.5);
        }

        @keyframes pulse-red-glass {
            0% { background: rgba(254, 226, 226, 0.4); }
            50% { background: rgba(254, 202, 202, 0.7); }
            100% { background: rgba(254, 226, 226, 0.4); }
        }

        .input-glass {
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 18px;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-md mx-auto mb-6 glass p-4 flex items-center gap-3">
        <div class="bg-blue-500/20 p-2 rounded-full">
            <span class="material-symbols-outlined text-blue-600 text-lg">notifications_active</span>
        </div>
        <p class="text-[11px] font-medium text-slate-600 leading-tight">
            Keep tab open for <span class="font-bold text-blue-600">Audio Alerts</span>. Ensure you click the golden button!
        </p>
    </div>

    <header class="max-w-md mx-auto mb-8 flex justify-between items-end">
        <div>
            <h1 class="text-2xl font-bold tracking-tight text-slate-800">Xeroid</h1>
            <p class="text-[10px] font-black text-blue-500 uppercase tracking-[0.2em]">Task Reminder</p>
            <button onclick="enableSound()" id="notif-toggle" class="flashy-activate flex items-center gap-2 px-4 py-2 text-white rounded-full text-[10px] font-bold uppercase tracking-widest mt-4 shadow-lg shadow-amber-200">
                <span class="material-symbols-outlined text-[16px]">volume_up</span> 
                Unlock Audio
            </button>
        </div>
        <div class="glass px-5 py-3 flex items-center gap-4">
            <div class="text-center">
                <p class="text-[9px] font-bold text-slate-400 uppercase">Tasks</p>
                <p id="total-stat" class="text-xl font-bold text-slate-700">0</p>
            </div>
            <div class="w-[1px] h-8 bg-white/60"></div>
            <div class="text-center cursor-pointer" onclick="document.getElementById('overdue-section').scrollIntoView()">
                <p class="text-[9px] font-bold text-red-400 uppercase">Late</p>
                <p id="overdue-badge" class="text-xl font-bold text-red-500">0</p>
            </div>
        </div>
    </header>

    <section class="max-w-md mx-auto glass p-6 mb-10 shadow-xl shadow-slate-200/50">
        <input id="task-title" type="text" placeholder="What needs doing?" class="w-full bg-transparent border-b border-white/80 pb-3 mb-5 outline-none font-semibold text-slate-700 placeholder:text-slate-400">
        <textarea id="task-desc" placeholder="Notes (Optional)" class="w-full bg-transparent text-xs text-slate-500 outline-none mb-5 h-12 no-scrollbar resize-none"></textarea>
        
        <div class="flex flex-col gap-4">
            <div class="input-glass p-3 flex items-center gap-3">
                <span class="material-symbols-outlined text-blue-500 text-lg">schedule</span>
                <input id="task-time" type="datetime-local" class="bg-transparent text-[11px] font-bold text-slate-600 outline-none w-full cursor-pointer">
            </div>
            <button onclick="addTask()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-sm shadow-xl shadow-blue-200 active:scale-95 transition-all flex items-center justify-center gap-2">
                <span class="material-symbols-outlined">add_task</span> Create Reminder
            </button>
        </div>
    </section>

    <main class="max-w-md mx-auto space-y-10 pb-20">
        <section>
            <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mb-5 px-2">Active Missions</h2>
            <div id="active-list" class="space-y-4"></div>
        </section>

        <section id="overdue-section">
            <h2 class="text-[10px] font-black text-red-400 uppercase tracking-[0.3em] mb-5 px-2">Critical Alerts</h2>
            <div id="overdue-list" class="space-y-4"></div>
        </section>
    </main>

    <script>
        let tasks = JSON.parse(localStorage.getItem('xeroid_ultra_v1')) || [];
        let soundEnabled = false;
        const alertSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

        function enableSound() {
            soundEnabled = true;
            const btn = document.getElementById('notif-toggle');
            btn.innerHTML = `<span class="material-symbols-outlined text-[16px]">check_circle</span> System Active`;
            btn.classList.remove('flashy-activate', 'bg-amber-500');
            btn.classList.add('bg-emerald-500', 'shadow-emerald-200');
            alertSound.play().then(() => alertSound.pause());
        }

        function addTask() {
            const title = document.getElementById('task-title').value;
            const desc = document.getElementById('task-desc').value;
            const time = document.getElementById('task-time').value;

            if (!title || !time) return;

            tasks.push({
                id: Date.now(),
                title,
                desc,
                deadline: new Date(time).getTime(),
                alertDone: false 
            });

            save();
            document.getElementById('task-title').value = '';
            document.getElementById('task-desc').value = '';
        }

        function save() {
            localStorage.setItem('xeroid_ultra_v1', JSON.stringify(tasks));
            render();
        }

        function render() {
            const activeList = document.getElementById('active-list');
            const overdueList = document.getElementById('overdue-list');
            const now = new Date().getTime();
            
            let overdueCount = 0;
            activeList.innerHTML = '';
            overdueList.innerHTML = '';

            tasks.forEach(task => {
                const diff = task.deadline - now;
                const isOverdue = diff < 0;
                if(isOverdue) overdueCount++;

                if (isOverdue && !task.alertDone && soundEnabled) {
                    alertSound.play();
                    task.alertDone = true;
                    save();
                }

                let timeStr = "";
                if(!isOverdue) {
                    const h = Math.floor(diff / 3600000);
                    const m = Math.floor((diff % 3600000) / 60000);
                    const s = Math.floor((diff % 60000) / 1000);
                    timeStr = `${h}h ${m}m ${s}s`;
                } else {
                    timeStr = "Overdue";
                }

                const cardHtml = `
                <div class="task-card-glass p-5 flex items-center justify-between gap-4 ${isOverdue ? 'pulse-overdue' : ''}">
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-[10px] font-black ${isOverdue ? 'text-red-600' : 'text-blue-500'} uppercase tracking-widest">${timeStr}</span>
                        </div>
                        <h3 class="text-sm font-bold text-slate-800 truncate">${task.title}</h3>
                        ${task.desc ? `<p class="text-[11px] text-slate-500 mt-1 line-clamp-1">${task.desc}</p>` : ''}
                    </div>
                    <button onclick="completeTask(${task.id})" class="flex-shrink-0 w-12 h-12 rounded-full glass flex items-center justify-center text-slate-300 hover:text-emerald-500 transition-all active:scale-90 shadow-sm border-white">
                        <span class="material-symbols-outlined text-3xl">check_circle</span>
                    </button>
                </div>`;

                if(isOverdue) overdueList.innerHTML += cardHtml;
                else activeList.innerHTML += cardHtml;
            });

            document.getElementById('total-stat').innerText = tasks.length;
            document.getElementById('overdue-badge').innerText = overdueCount;
        }

        function completeTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            save();
        }

        setInterval(render, 1000);
        render();
    </script>
</body>
</html>
